<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin — Location Voiture Madagascar</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div style="font-size:1.5rem;margin-bottom:4px">🚗</div>
      <div class="brand-name">Location Voiture</div>
      <div class="brand-sub">Madagascar — Admin</div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-link active">📊 Dashboard</a>
      <a href="reservations.html" class="sidebar-link">📋 Réservations</a>
      <a href="vehicules.html" class="sidebar-link">🚗 Véhicules</a>
      <a href="planning.html" class="sidebar-link">📅 Planning</a>
      <a href="maintenance.html" class="sidebar-link">🔧 Maintenance</a>
      <a href="factures.html" class="sidebar-link">📄 Factures</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" class="sidebar-link" style="font-size:12px">🌐 Voir le site</a>
      <button onclick="adminLogout()" class="sidebar-link" style="background:none;border:none;cursor:pointer;color:#fca5a5;width:100%;text-align:left;font-size:13px">🚪 Déconnexion</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-header">
      <h1>📊 Dashboard</h1>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card kpi-vert"><div class="kpi-label">CA Total</div><div class="kpi-val text-vert" id="kpi-ca">—</div></div>
      <div class="kpi-card kpi-bleu"><div class="kpi-label">Encaissé</div><div class="kpi-val" style="color:#1e40af" id="kpi-encaisse">—</div></div>
      <div class="kpi-card kpi-rouge"><div class="kpi-label">Reste à percevoir</div><div class="kpi-val text-rouge" id="kpi-reste">—</div></div>
      <div class="kpi-card kpi-jaune"><div class="kpi-label">En attente validation</div><div class="kpi-val" style="color:#854d0e" id="kpi-attente">—</div></div>
    </div>

    <!-- Réservations en attente -->
    <div class="card mb-3" id="attente-section">
      <h2 style="color:#854d0e;margin-bottom:1rem">⏳ En attente de validation</h2>
      <div id="attente-liste"><div class="text-muted">Chargement...</div></div>
    </div>

    <!-- Stats -->
    <div class="grid-2">
      <div class="card">
        <h2 style="margin-bottom:1rem">🚗 Locations par voiture</h2>
        <div id="stats-voitures"></div>
      </div>
      <div class="card">
        <h2 style="margin-bottom:1rem">📈 Stats générales</h2>
        <div id="stats-generales"></div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script>
requireAdmin()

async function charger() {
  const [{ data: reservations }, { data: vehicules }, { data: maintenances }] = await Promise.all([
    db.from('reservations').select('*, clients(*), vehicules(*)'),
    db.from('vehicules').select('*').eq('actif', true),
    db.from('maintenances').select('*').eq('statut', 'EN_COURS'),
  ])

  const ca = reservations?.reduce((s, r) => s + (r.total_a_payer || 0), 0) || 0
  const encaisse = reservations?.reduce((s, r) => s + (r.montant_paye || 0), 0) || 0
  const reste = reservations?.reduce((s, r) => s + (r.reste || 0), 0) || 0
  const enAttente = reservations?.filter(r => r.statut_resa === 'EN_ATTENTE') || []

  document.getElementById('kpi-ca').textContent = ca.toLocaleString() + ' Ar'
  document.getElementById('kpi-encaisse').textContent = encaisse.toLocaleString() + ' Ar'
  document.getElementById('kpi-reste').textContent = reste.toLocaleString() + ' Ar'
  document.getElementById('kpi-attente').textContent = enAttente.length + ' résa'

  // En attente
  const attenteEl = document.getElementById('attente-liste')
  if (enAttente.length === 0) {
    attenteEl.innerHTML = '<div class="text-muted text-sm">Aucune réservation en attente ✅</div>'
  } else {
    attenteEl.innerHTML = enAttente.slice(0, 5).map(r => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;margin-bottom:8px">
        <div>
          <div class="font-bold text-sm">${r.id} — ${r.clients?.nom} ${r.clients?.prenom || ''}</div>
          <div class="text-xs text-muted">${r.vehicules?.nom} | ${r.date_debut} → ${r.date_fin}</div>
          <div class="text-xs text-muted">📍 ${r.depart} → ${r.destination}</div>
        </div>
        <div style="text-align:right">
          <div class="font-bold text-sm text-vert">${r.total_a_payer?.toLocaleString()} Ar</div>
          <div class="text-xs" style="color:${r.montant_paye > 0 ? '#1e40af' : '#854d0e'}">
            ${r.montant_paye > 0 ? '🔵 Acompte versé' : '🟡 Sans acompte'}
          </div>
          <a href="reservations.html" class="text-xs text-vert" style="text-decoration:underline">Valider →</a>
        </div>
      </div>
    `).join('')
  }

  // Stats voitures
  document.getElementById('stats-voitures').innerHTML = vehicules?.map(v => {
    const nb = reservations?.filter(r => r.vehicule_id === v.id).length || 0
    const caV = reservations?.filter(r => r.vehicule_id === v.id).reduce((s, r) => s + (r.total_a_payer || 0), 0) || 0
    return `
      <div style="display:flex;justify-content:space-between;padding:8px;background:#f9fafb;border-radius:6px;margin-bottom:6px">
        <span class="text-sm font-bold">${v.nom}</span>
        <div>
          <span class="text-xs text-muted">${nb} loc.</span>
          <span class="text-xs text-vert font-bold ml-1">${caV.toLocaleString()} Ar</span>
        </div>
      </div>
    `
  }).join('') || ''

  // Stats générales
  const nonPayees = reservations?.filter(r => r.statut_paiement === 'NON PAYÉ').length || 0
  document.getElementById('stats-generales').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;justify-content:space-between;padding:8px;background:#f9fafb;border-radius:6px"><span class="text-sm">Total réservations</span><span class="font-bold">${reservations?.length || 0}</span></div>
      <div style="display:flex;justify-content:space-between;padding:8px;background:#f9fafb;border-radius:6px"><span class="text-sm">Non payées</span><span class="font-bold text-rouge">${nonPayees}</span></div>
      <div style="display:flex;justify-content:space-between;padding:8px;background:#f9fafb;border-radius:6px"><span class="text-sm">Maintenances en cours</span><span class="font-bold" style="color:#ea580c">${maintenances?.length || 0}</span></div>
      <div style="display:flex;justify-content:space-between;padding:8px;background:#f9fafb;border-radius:6px"><span class="text-sm">Véhicules actifs</span><span class="font-bold text-vert">${vehicules?.length || 0}</span></div>
    </div>
  `
}

charger()
</script>
</body>
</html>
